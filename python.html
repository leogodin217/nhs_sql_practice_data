<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net blob:; worker-src blob:; style-src 'self' 'unsafe-inline'; connect-src 'self' https://cdn.jsdelivr.net https://pypi.org https://files.pythonhosted.org; img-src 'self' data:;">
  <title>NHS Python Practice — Millbrook NHS Trust</title>
  <style>
    :root {
      --nhs-blue: #005EB8;
      --nhs-dark-blue: #003087;
      --nhs-red: #d5281b;
      --bg: #f0f4f5;
      --surface: #ffffff;
      --border: #d8dde0;
      --text: #212b32;
      --text-secondary: #4c6272;
      --editor-bg: #1e1e1e;
      --editor-text: #d4d4d4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Loading overlay ─────────────────────────────────── */
    #loading-overlay {
      position: fixed; inset: 0; background: white;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100;
    }
    #loading-overlay.hidden { display: none; }
    #loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--nhs-blue);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-message { margin-top: 16px; font-size: 15px; color: var(--text-secondary); }
    #loading-progress {
      width: 220px; height: 4px; background: var(--border);
      border-radius: 2px; margin-top: 12px; overflow: hidden;
    }
    #loading-progress-bar {
      width: 0%; height: 100%; background: var(--nhs-blue); transition: width 0.15s;
    }

    /* ── Header ──────────────────────────────────────────── */
    #app-header {
      height: 48px; background: var(--nhs-blue); color: white;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; flex-shrink: 0;
    }
    #app-header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    #db-status { font-size: 13px; opacity: 0.85; }

    /* ── Layout ──────────────────────────────────────────── */
    #layout { display: flex; height: calc(100vh - 48px); }

    #exercises-panel {
      width: 42%; overflow-y: auto; background: var(--surface);
      border-right: 1px solid var(--border); flex-shrink: 0;
      min-width: 0; transition: width 0.2s ease;
    }
    #exercises-panel.collapsed { width: 0 !important; min-width: 0; overflow: hidden; border-right: none; }
    body.dragging #exercises-panel { transition: none; }
    #main-panel { flex: 1; display: flex; flex-direction: column; min-width: 300px; }

    /* ── Exercises content ────────────────────────────────── */
    #browser-banner {
      padding: 12px 24px; background: #e8edee; font-size: 13px;
      color: var(--text-secondary); line-height: 1.5;
      border-bottom: 1px solid var(--border);
    }
    #browser-banner strong { color: var(--text); }
    #exercises-content { padding: 24px; line-height: 1.6; }
    #exercises-content h1 { font-size: 22px; margin-bottom: 4px; }
    #exercises-content h2 {
      font-size: 17px; margin: 28px 0 12px;
      padding-bottom: 6px; border-bottom: 2px solid var(--nhs-blue); color: var(--nhs-blue);
    }
    #exercises-content h3 { font-size: 15px; margin: 20px 0 8px; }
    #exercises-content p { margin: 8px 0; font-size: 14.5px; }
    #exercises-content ul, #exercises-content ol { margin: 8px 0 8px 24px; font-size: 14.5px; }
    #exercises-content li { margin: 4px 0; }
    #exercises-content a { color: var(--nhs-blue); }

    #exercises-content pre {
      background: #2d2d2d; color: #d4d4d4; padding: 12px 14px;
      border-radius: 4px; overflow-x: auto; margin: 10px 0;
      font-size: 13px; line-height: 1.5; position: relative;
    }
    #exercises-content pre:has(code.language-python) { cursor: pointer; }
    #exercises-content pre:has(code.language-python):hover { outline: 2px solid var(--nhs-blue); }
    #exercises-content pre:has(code.language-python)::after {
      content: 'click to load';
      position: absolute; top: 6px; right: 8px;
      font-size: 11px; color: #aaa; background: rgba(0,0,0,0.4);
      padding: 1px 7px; border-radius: 3px;
      opacity: 0; transition: opacity 0.15s; font-family: sans-serif;
    }
    #exercises-content pre:has(code.language-python):hover::after { opacity: 1; }

    #exercises-content code {
      font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace; font-size: 13px;
    }
    #exercises-content :not(pre) > code {
      background: #e8edee; padding: 1px 5px; border-radius: 3px; font-size: 12.5px;
    }
    #exercises-content table {
      border-collapse: collapse; margin: 10px 0; font-size: 13px; width: auto;
    }
    #exercises-content th, #exercises-content td {
      border: 1px solid var(--border); padding: 4px 10px; text-align: left;
    }
    #exercises-content th { background: var(--bg); font-weight: 600; }
    #exercises-content details { margin: 10px 0; }
    #exercises-content summary {
      cursor: pointer; font-weight: 600; color: var(--nhs-blue); font-size: 14px;
    }
    #exercises-content summary:hover { text-decoration: underline; }
    #exercises-content hr { margin: 28px 0; border: none; border-top: 1px solid var(--border); }
    #exercises-content blockquote {
      border-left: 3px solid var(--nhs-blue); padding-left: 14px;
      margin: 10px 0; color: var(--text-secondary);
    }

    /* ── Splitters ─────────────────────────────────────────── */
    .splitter { flex-shrink: 0; background: var(--border); position: relative; z-index: 2; }
    .splitter:hover, .splitter:active { background: var(--nhs-blue); }
    .splitter-v {
      width: 5px; cursor: col-resize; background: #c8cfd3;
    }
    .splitter-h {
      height: 5px; cursor: row-resize; background: #c8cfd3;
    }
    .splitter::after {
      content: ''; position: absolute;
      background: #999; border-radius: 1px;
    }
    .splitter:hover::after, .splitter:active::after { background: white; }
    .splitter-v::after {
      width: 3px; height: 32px;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      border-left: 1px solid #999; border-right: 1px solid #999;
      background: transparent;
    }
    .splitter-h::after {
      height: 3px; width: 32px;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      border-top: 1px solid #999; border-bottom: 1px solid #999;
      background: transparent;
    }
    body.dragging { user-select: none; }
    body.dragging-col { cursor: col-resize !important; }
    body.dragging-row { cursor: row-resize !important; }

    /* ── Collapse button ──────────────────────────────────── */
    #collapse-btn {
      position: absolute; top: 50%; right: -18px; transform: translateY(-50%);
      width: 18px; height: 36px; background: var(--surface);
      border: 1px solid var(--border); border-left: none;
      border-radius: 0 4px 4px 0; cursor: pointer; z-index: 3;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--text-secondary); padding: 0;
    }
    #collapse-btn:hover { background: var(--bg); color: var(--nhs-blue); }

    /* ── Editor ──────────────────────────────────────────── */
    #editor-panel { display: flex; flex-direction: column; flex-shrink: 0; min-height: 80px; overflow: hidden; }
    #editor-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; background: #f8f9fa; border-bottom: 1px solid var(--border);
    }
    #editor-toolbar .actions { display: flex; align-items: center; gap: 8px; }
    .shortcut-hint { font-size: 12px; color: var(--text-secondary); }

    #sql-editor {
      width: 100%; flex: 1; height: 0;
      font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
      font-size: 14px; line-height: 1.5; padding: 12px 14px;
      background: var(--editor-bg); color: var(--editor-text);
      border: none; resize: none; outline: none; tab-size: 4;
    }
    #sql-editor::placeholder { color: #666; }

    /* ── Buttons ─────────────────────────────────────────── */
    button {
      font-family: inherit; cursor: pointer; border: none; border-radius: 4px;
      padding: 5px 14px; font-size: 13px; font-weight: 500;
    }
    #run-btn { background: var(--nhs-blue); color: white; }
    #run-btn:hover:not(:disabled) { background: var(--nhs-dark-blue); }
    #run-btn:disabled { opacity: 0.5; cursor: default; }
    #reset-btn {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    #reset-btn:hover:not(:disabled) { background: var(--bg); }
    #reset-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Results ─────────────────────────────────────────── */
    #results-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 80px; }
    #results-meta {
      padding: 7px 14px; font-size: 13px; color: var(--text-secondary);
      background: #f8f9fa; border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
      min-height: 33px;
    }
    #results-scroll { overflow: auto; flex: 1; }

    /* ── Python output ──────────────────────────────────── */
    #results-content { padding: 0; }

    .stdout {
      padding: 14px; margin: 0;
      font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
      font-size: 13px; line-height: 1.5;
      white-space: pre-wrap; word-wrap: break-word;
      background: white;
    }

    .df-output { overflow-x: auto; }
    .df-output table {
      width: 100%; border-collapse: collapse;
      font-size: 13px; font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
    }
    .df-output th {
      background: var(--bg); position: sticky; top: 0; z-index: 1;
      border-bottom: 2px solid var(--border); font-weight: 600;
    }
    .df-output td, .df-output th {
      padding: 5px 10px; text-align: left; border-bottom: 1px solid #eee;
      white-space: nowrap; max-width: 400px; overflow: hidden; text-overflow: ellipsis;
    }
    .df-output tr:hover td { background: #f0f7ff; }
    .df-output .blank { color: #999; }

    .fig-output { padding: 14px; text-align: center; }
    .fig-output img { max-width: 100%; border-radius: 4px; }

    .error-msg {
      padding: 14px; background: #fde8e8; color: var(--nhs-red);
      border-radius: 4px; margin: 14px;
      font-family: 'Fira Code', Consolas, monospace; font-size: 13px;
      white-space: pre-wrap; line-height: 1.5;
    }
    .placeholder-msg { padding: 20px 14px; color: var(--text-secondary); font-size: 14px; }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 900px) {
      #layout { flex-direction: column; }
      #exercises-panel {
        width: 100% !important; height: 40vh; border-right: none;
        border-bottom: 1px solid var(--border);
      }
      #exercises-panel.collapsed { height: 0 !important; width: 100% !important; border-bottom: none; }
      #main-panel { width: 100%; min-width: 0; }
      .splitter-v { display: none !important; }
    }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div id="loading-spinner"></div>
  <div id="loading-message">Initializing...</div>
  <div id="loading-progress"><div id="loading-progress-bar"></div></div>
</div>

<header id="app-header">
  <h1>NHS Python Practice</h1>
  <span id="db-status"></span>
</header>

<div id="layout">
  <aside id="exercises-panel">
    <div id="browser-banner">
      <strong>Browser edition.</strong>
      Python is running in your browser via Pyodide — no install needed.
      Click any Python block in the exercises to load it into the editor.
    </div>
    <div id="exercises-content">
      <p class="placeholder-msg">Loading exercises...</p>
    </div>
  </aside>

  <div id="v-splitter" class="splitter splitter-v">
    <button id="collapse-btn" title="Collapse exercises panel">&#9664;</button>
  </div>

  <div id="main-panel">
    <div id="editor-panel">
      <div id="editor-toolbar">
        <div class="actions">
          <button id="run-btn" disabled>Run</button>
          <button id="reset-btn" disabled>Reset</button>
        </div>
        <span class="shortcut-hint" id="shortcut-hint"></span>
      </div>
      <textarea
        id="sql-editor"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        placeholder="# Write Python here"
      ></textarea>
    </div>
    <div id="h-splitter" class="splitter splitter-h"></div>
    <div id="results-panel">
      <div id="results-meta"></div>
      <div id="results-scroll">
        <div id="results-content">
          <p class="placeholder-msg">Run code to see results here.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<noscript>
  <div style="padding:40px;text-align:center;font-family:sans-serif;">
    <h2>JavaScript Required</h2>
    <p>This Python practice tool runs Pyodide in your browser and requires JavaScript.</p>
  </div>
</noscript>

<script type="module">
  import { marked } from 'https://cdn.jsdelivr.net/npm/marked@17.0.4/+esm';
  import DOMPurify from 'https://cdn.jsdelivr.net/npm/dompurify@3.3.3/+esm';

  const CACHE_V = '?v=' + Date.now();

  const CSV_FILES = [
    'dim_consultant.csv', 'dim_diagnostic.csv', 'dim_medication.csv',
    'dim_patient.csv', 'dim_procedure.csv', 'dim_theatre.csv', 'dim_ward.csv',
    'fact_admission.csv', 'fact_appointment_attended.csv',
    'fact_cancer_first_seen.csv', 'fact_cancer_referral.csv',
    'fact_death_record.csv', 'fact_diagnostic_ordered.csv',
    'fact_diagnostic_performed.csv', 'fact_discharge.csv',
    'fact_dtoc_assessment.csv', 'fact_ed_arrival.csv', 'fact_ed_assessment.csv',
    'fact_fft_response.csv', 'fact_icu_care.csv', 'fact_journey_states.csv',
    'fact_medication_administered.csv', 'fact_pre_op_assessment.csv',
    'fact_referral_created.csv', 'fact_safety_incident.csv',
    'fact_surgeon_assigned.csv', 'fact_surgery_performed.csv',
    'fact_triage.csv', 'fact_ward_assignment.csv',
  ];

  // Python code that sets up the execution environment
  const PYTHON_INIT = `
import matplotlib
matplotlib.use('agg')
import warnings
warnings.filterwarnings('ignore', message='.*FigureCanvasAgg is non-interactive.*')
warnings.filterwarnings('ignore', message='.*Adding/subtracting object-dtype.*')

_ns = {}
exec('''
import pandas as pd
import numpy as np
import matplotlib
matplotlib.use("agg")
import matplotlib.pyplot as plt
import warnings
warnings.filterwarnings("ignore", message=".*FigureCanvasAgg is non-interactive.*")
warnings.filterwarnings("ignore", message=".*Adding/subtracting object-dtype.*")
''', _ns)

def _execute(code):
    import sys, io, base64, ast, traceback, json

    old_stdout = sys.stdout
    sys.stdout = io.StringIO()

    result = {'stdout': '', 'html': '', 'figures': '', 'error': ''}

    try:
        tree = ast.parse(code)
        if tree.body and isinstance(tree.body[-1], ast.Expr):
            if len(tree.body) > 1:
                mod = ast.Module(body=tree.body[:-1], type_ignores=[])
                exec(compile(mod, '<user>', 'exec'), _ns)
            val = eval(compile(ast.Expression(body=tree.body[-1].value), '<user>', 'eval'), _ns)
            if val is not None:
                try:
                    import pandas as _pd
                    if isinstance(val, _pd.DataFrame):
                        result['html'] = val.to_html(max_rows=200, border=0)
                    elif isinstance(val, _pd.Series):
                        result['html'] = val.to_frame().to_html(max_rows=200, border=0)
                    else:
                        print(repr(val))
                except ImportError:
                    print(repr(val))
        else:
            exec(compile(tree, '<user>', 'exec'), _ns)
    except Exception:
        result['error'] = traceback.format_exc()

    result['stdout'] = sys.stdout.getvalue()
    sys.stdout = old_stdout

    try:
        import matplotlib.pyplot as _plt
        if _plt.get_fignums():
            figs = ''
            for num in _plt.get_fignums():
                buf = io.BytesIO()
                _plt.figure(num).savefig(buf, format='png', dpi=100,
                    bbox_inches='tight', facecolor='white', edgecolor='none')
                buf.seek(0)
                b64 = base64.b64encode(buf.read()).decode()
                figs += '<img src="data:image/png;base64,' + b64 + '" style="max-width:100%">'
            result['figures'] = figs
            _plt.close('all')
    except Exception:
        pass

    return json.dumps(result)

def _reset_ns():
    global _ns
    _ns.clear()
    exec('''
import pandas as pd
import numpy as np
import matplotlib
matplotlib.use("agg")
import matplotlib.pyplot as plt
import warnings
warnings.filterwarnings("ignore", message=".*FigureCanvasAgg is non-interactive.*")
warnings.filterwarnings("ignore", message=".*Adding/subtracting object-dtype.*")
''', _ns)
`;

  // ── DOM refs ───────────────────────────────────────────────
  const $ = (id) => document.getElementById(id);
  const loadingOverlay  = $('loading-overlay');
  const loadingMessage  = $('loading-message');
  const loadingBar      = $('loading-progress-bar');
  const dbStatus        = $('db-status');
  const exercisesEl     = $('exercises-content');
  const editor          = $('sql-editor');
  const runBtn          = $('run-btn');
  const resetBtn        = $('reset-btn');
  const resultsMeta     = $('results-meta');
  const resultsContent  = $('results-content');

  const layout          = $('layout');
  const exercisesPanel  = $('exercises-panel');
  const mainPanel       = $('main-panel');
  const editorPanel     = $('editor-panel');
  const vSplitter       = $('v-splitter');
  const hSplitter       = $('h-splitter');
  const collapseBtn     = $('collapse-btn');

  let pyodide = null;

  const modKey = /Mac|iPhone|iPad/.test(navigator.platform) ? '\u2318' : 'Ctrl';
  $('shortcut-hint').textContent = `${modKey}+Enter to run \u00b7 Tab indents`;

  // ── Splitter utility ──────────────────────────────────────
  function initSplitter(splitter, direction, before, container, minBefore, minAfter) {
    const isCol = direction === 'col';
    const prop = isCol ? 'width' : 'height';
    const clientPos = isCol ? 'clientX' : 'clientY';
    const cursorClass = isCol ? 'dragging-col' : 'dragging-row';

    function onPointerDown(startE) {
      startE.preventDefault();
      const startPos = startE[clientPos];
      const startSize = before.getBoundingClientRect()[prop];
      const containerSize = container.getBoundingClientRect()[prop];
      const splitterSize = splitter.getBoundingClientRect()[prop];
      const maxBefore = containerSize - minAfter - splitterSize;

      document.body.classList.add('dragging', cursorClass);

      function onMove(e) {
        const delta = e[clientPos] - startPos;
        const newSize = Math.min(maxBefore, Math.max(minBefore, startSize + delta));
        before.style[prop] = newSize + 'px';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.classList.remove('dragging', cursorClass);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    function onTouchStart(startE) {
      const touch = startE.touches[0];
      const startPos = touch[clientPos];
      const startSize = before.getBoundingClientRect()[prop];
      const containerSize = container.getBoundingClientRect()[prop];
      const splitterSize = splitter.getBoundingClientRect()[prop];
      const maxBefore = containerSize - minAfter - splitterSize;

      function onTouchMove(e) {
        e.preventDefault();
        const delta = e.touches[0][clientPos] - startPos;
        const newSize = Math.min(maxBefore, Math.max(minBefore, startSize + delta));
        before.style[prop] = newSize + 'px';
      }
      function onTouchEnd() {
        document.removeEventListener('touchmove', onTouchMove);
        document.removeEventListener('touchend', onTouchEnd);
      }
      document.addEventListener('touchmove', onTouchMove, { passive: false });
      document.addEventListener('touchend', onTouchEnd);
    }

    splitter.addEventListener('mousedown', onPointerDown);
    splitter.addEventListener('touchstart', onTouchStart, { passive: true });
  }

  // ── Collapse / expand exercises ───────────────────────────
  let savedExercisesWidth = null;
  let exercisesCollapsed = false;

  collapseBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (exercisesCollapsed) {
      exercisesPanel.classList.remove('collapsed');
      if (savedExercisesWidth) exercisesPanel.style.width = savedExercisesWidth;
      collapseBtn.innerHTML = '&#9664;';
      collapseBtn.title = 'Collapse exercises panel';
    } else {
      savedExercisesWidth = exercisesPanel.style.width || exercisesPanel.getBoundingClientRect().width + 'px';
      exercisesPanel.classList.add('collapsed');
      collapseBtn.innerHTML = '&#9654;';
      collapseBtn.title = 'Expand exercises panel';
    }
    exercisesCollapsed = !exercisesCollapsed;
  });

  // ── Init splitters ────────────────────────────────────────
  initSplitter(vSplitter, 'col', exercisesPanel, layout, 200, 300);
  initSplitter(hSplitter, 'row', editorPanel, mainPanel, 80, 80);

  // ── Initialization ─────────────────────────────────────────
  async function init() {
    try {
      if (location.protocol === 'file:') {
        throw new Error('Cannot load data from file://. Serve this folder with a local server:\n  python -m http.server\nThen open http://localhost:8000/python.html');
      }

      // 1. Load Pyodide runtime
      loadingMessage.textContent = 'Loading Python runtime\u2026';
      loadingBar.style.width = '5%';
      const { loadPyodide } = await import('https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.mjs');
      pyodide = await loadPyodide();
      loadingBar.style.width = '25%';

      // 2. Load scientific packages + fetch exercises in parallel
      loadingMessage.textContent = 'Installing packages\u2026';
      const packagesPromise = pyodide.loadPackage(['pandas', 'matplotlib', 'scipy', 'scikit-learn', 'micropip']);
      const exercisesPromise = loadExercises();

      // 3. Fetch CSV data in parallel
      const csvPromise = Promise.all(CSV_FILES.map(async (f) => {
        const resp = await fetch('./data/' + f + CACHE_V);
        if (!resp.ok) throw new Error('Failed to fetch ' + f);
        return [f, await resp.text()];
      }));

      await packagesPromise;
      loadingBar.style.width = '55%';

      // 4. Install seaborn via micropip
      loadingMessage.textContent = 'Installing seaborn\u2026';
      await pyodide.runPythonAsync(`
import micropip
await micropip.install('seaborn')
`);
      loadingBar.style.width = '65%';

      // 5. Wait for CSV data and write to virtual FS
      loadingMessage.textContent = 'Loading dataset\u2026';
      const csvData = await csvPromise;
      await exercisesPromise;

      try { pyodide.FS.mkdir('data'); } catch {}
      for (const [name, content] of csvData) {
        pyodide.FS.writeFile('data/' + name, content);
      }
      loadingBar.style.width = '85%';

      // 6. Set up Python environment
      loadingMessage.textContent = 'Initializing environment\u2026';
      await pyodide.runPythonAsync(PYTHON_INIT);
      loadingBar.style.width = '100%';

      // 7. Ready
      loadingOverlay.classList.add('hidden');
      dbStatus.textContent = `${CSV_FILES.length} tables \u00b7 pandas \u00b7 matplotlib \u00b7 seaborn \u00b7 scipy \u00b7 sklearn`;
      runBtn.disabled = false;
      resetBtn.disabled = false;
      editorPanel.style.height = Math.round(mainPanel.getBoundingClientRect().height * 0.4) + 'px';
      editor.value = 'import pandas as pd\n\n# List all available CSV files\nimport os\nfor f in sorted(os.listdir("data")):\n    print(f)';
      editor.focus();
      editor.setSelectionRange(0, editor.value.length);

    } catch (err) {
      loadingMessage.textContent = err.message;
      loadingMessage.style.color = 'var(--nhs-red)';
      loadingMessage.style.whiteSpace = 'pre-wrap';
      loadingMessage.style.maxWidth = '500px';
      loadingMessage.style.textAlign = 'center';
      console.error('Init failed:', err);
    }
  }

  async function loadExercises() {
    try {
      const resp = await fetch('./python_exercises.md' + CACHE_V);
      if (!resp.ok) throw new Error();
      exercisesEl.innerHTML = DOMPurify.sanitize(marked.parse(await resp.text()));
    } catch {
      exercisesEl.innerHTML =
        '<p class="placeholder-msg">Could not load exercises. <a href="python_exercises.md">View python_exercises.md directly</a>.</p>';
    }
  }

  // ── Code Execution ────────────────────────────────────────
  async function runCode() {
    const code = editor.value.trim();
    if (!code || !pyodide) return;

    runBtn.disabled = true;
    resultsMeta.textContent = 'Running\u2026';
    resultsContent.innerHTML = '';

    const t0 = performance.now();
    try {
      const resultJson = await pyodide.runPythonAsync(`_execute(${JSON.stringify(code)})`);
      const r = JSON.parse(resultJson);
      renderResults(r, elapsed(t0));
    } catch (err) {
      resultsMeta.textContent = `Error \u00b7 ${elapsed(t0)}`;
      resultsContent.innerHTML = `<div class="error-msg">${esc(err.message)}</div>`;
    } finally {
      runBtn.disabled = false;
    }
  }

  function elapsed(t0) { return ((performance.now() - t0) / 1000).toFixed(2) + 's'; }

  // ── Render Results ─────────────────────────────────────────
  function renderResults(r, time) {
    let html = '';

    if (r.error) {
      html += `<div class="error-msg">${esc(r.error)}</div>`;
    }
    if (r.stdout) {
      html += `<pre class="stdout">${esc(r.stdout)}</pre>`;
    }
    if (r.html) {
      html += `<div class="df-output">${DOMPurify.sanitize(r.html)}</div>`;
    }
    if (r.figures) {
      html += `<div class="fig-output">${DOMPurify.sanitize(r.figures)}</div>`;
    }

    if (!html) {
      html = '<p class="placeholder-msg">Code executed successfully (no output).</p>';
    }

    resultsMeta.textContent = r.error ? `Error \u00b7 ${time}` : `Done \u00b7 ${time}`;
    resultsContent.innerHTML = html;
  }

  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#x27;');
  }

  // ── Reset ──────────────────────────────────────────────────
  async function resetEnv() {
    runBtn.disabled = true;
    resetBtn.disabled = true;
    resultsContent.innerHTML = '';
    resultsMeta.textContent = 'Resetting\u2026';
    try {
      await pyodide.runPythonAsync('_reset_ns()');
      resultsMeta.textContent = '';
      resultsContent.innerHTML = '<p class="placeholder-msg">Environment reset. All variables cleared.</p>';
    } catch (err) {
      resultsMeta.textContent = 'Reset failed';
      resultsContent.innerHTML = `<div class="error-msg">${esc(err.message)}</div>`;
    }
    runBtn.disabled = false;
    resetBtn.disabled = false;
  }

  // ── Event Handlers ─────────────────────────────────────────
  runBtn.addEventListener('click', runCode);
  resetBtn.addEventListener('click', resetEnv);

  editor.addEventListener('keydown', (e) => {
    // Run code
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runCode();
      return;
    }
    // Tab inserts four spaces
    if (e.key === 'Tab') {
      e.preventDefault();
      const pos = editor.selectionStart;
      editor.value = editor.value.substring(0, pos) + '    ' + editor.value.substring(editor.selectionEnd);
      editor.selectionStart = editor.selectionEnd = pos + 4;
    }
  });

  // Click Python code blocks in exercises to load into editor
  exercisesEl.addEventListener('click', (e) => {
    const pre = e.target.closest('#exercises-content pre');
    if (!pre) return;
    const code = pre.querySelector('code');
    if (!code || !code.classList.contains('language-python')) return;
    editor.value = code.textContent;
    editor.focus();
    editor.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });

  // ── Start ──────────────────────────────────────────────────
  init();
</script>
</body>
</html>
